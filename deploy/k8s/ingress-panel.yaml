apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: agent-panel
  namespace: agentpanel
  annotations:
    kubernetes.io/ingress.class: nginx
    # 启用 cert-manager 自动签发 TLS 证书时取消下行注释，并确保已安装 ClusterIssuer
    # cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - agent-panel.example.com
      secretName: agent-panel-tls
  rules:
    - host: agent-panel.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: agent-panel
                port:
                  number: 80
