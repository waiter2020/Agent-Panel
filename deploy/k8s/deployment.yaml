apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-panel
  namespace: agentpanel
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agent-panel
  template:
    metadata:
      labels:
        app: agent-panel
    spec:
      serviceAccountName: agent-panel
      containers:
        - name: panel
          image: agent-panel:latest
          ports:
            - containerPort: 80
              name: http
            - containerPort: 8080
              name: management
          envFrom:
            - configMapRef:
                name: agent-panel-config
            - secretRef:
                name: agent-panel-secret
          volumeMounts:
            - name: panel-logs
              mountPath: /var/log/agent-panel
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 60
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
      volumes:
        - name: panel-logs
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: agent-panel
  namespace: agentpanel
spec:
  selector:
    app: agent-panel
  ports:
    - port: 80
      targetPort: 80
  type: ClusterIP
