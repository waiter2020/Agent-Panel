apiVersion: v1
kind: ServiceAccount
metadata:
  name: agent-panel
  namespace: agentpanel
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: agent-panel-apps-manager
  namespace: agentpanel-apps
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["services", "pods", "pods/log", "persistentvolumeclaims", "secrets", "configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: agent-panel-apps-manager
  namespace: agentpanel-apps
subjects:
  - kind: ServiceAccount
    name: agent-panel
    namespace: agentpanel
roleRef:
  kind: Role
  name: agent-panel-apps-manager
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: agent-panel-metrics-reader
rules:
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods", "nodes"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["nodes/stats", "nodes/proxy"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: agent-panel-metrics-reader
subjects:
  - kind: ServiceAccount
    name: agent-panel
    namespace: agentpanel
roleRef:
  kind: ClusterRole
  name: agent-panel-metrics-reader
  apiGroup: rbac.authorization.k8s.io
