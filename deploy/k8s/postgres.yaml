apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-data
  namespace: agentpanel
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: agentpanel
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: pgvector/pgvector:pg16
          env:
            - name: POSTGRES_DB
              value: agentpanel
            - name: POSTGRES_USER
              value: agentpanel
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: agent-panel-secret
                  key: DB_PASSWORD
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: postgres-data
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: agentpanel
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
