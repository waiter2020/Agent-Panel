services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: agentpanel
      POSTGRES_USER: agentpanel
      POSTGRES_PASSWORD: agentpanel
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentpanel"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - agentpanel-net

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agentpanel-net

  panel:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: agent-panel
    hostname: agent-panel
    ports:
      - "8080:80"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: agentpanel
      DB_USER: agentpanel
      DB_PASSWORD: agentpanel
      AGENT_RUNTIME_PROVIDER: docker
      DOCKER_HOST: unix:///var/run/docker.sock
      AGENT_DATA_ROOT: /app/data/apps
      AGENT_DATA_VOLUME_NAME: deploy_app-data
      AGENT_ACCESS_HOST: localhost
      STORAGE_ENDPOINT: http://minio:9000
      STORAGE_ACCESS_KEY: minioadmin
      STORAGE_SECRET_KEY: minioadmin
      STORAGE_BUCKET: agent-panel
      PANEL_INFERENCE_URL: http://agent-panel/v1
      JWT_SECRET: agent-panel-dev-secret-key-change-in-production-32chars
      APP_SECRET_KEY: 0123456789abcdef0123456789abcdef
      LOG_PATH: /var/log/agent-panel
      LOG_LEVEL: INFO
      SPRING_PROFILES_ACTIVE: prod
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - app-data:/app/data/apps
      - panel-logs:/var/log/agent-panel
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - agentpanel-net
    restart: unless-stopped

volumes:
  postgres-data:
  minio-data:
  app-data:
  panel-logs:

networks:
  agentpanel-net:
    name: agentpanel-net
    driver: bridge
