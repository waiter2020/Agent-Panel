apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "agent-panel.fullname" . }}-config
  namespace: {{ include "agent-panel.namespace" . }}
  labels:
    {{- include "agent-panel.labels" . | nindent 4 }}
data:
  SPRING_PROFILES_ACTIVE: {{ .Values.panel.springProfilesActive | quote }}
  LOG_PATH: {{ .Values.panel.logPath | quote }}
  LOG_LEVEL: {{ .Values.panel.logLevel | quote }}
  AGENT_RUNTIME_PROVIDER: {{ .Values.panel.runtimeProvider | quote }}
  DB_HOST: {{ .Values.database.host | quote }}
  DB_PORT: {{ .Values.database.port | quote }}
  DB_NAME: {{ .Values.database.name | quote }}
  STORAGE_ENDPOINT: {{ .Values.storage.endpoint | quote }}
  STORAGE_BUCKET: {{ .Values.storage.bucket | quote }}
  K8S_IN_CLUSTER: {{ .Values.panel.k8sInCluster | quote }}
  K8S_ACCESS_HOST: {{ .Values.panel.k8sAccessHost | quote }}
  PANEL_INFERENCE_URL: {{ .Values.panel.inferenceUrl | quote }}
  K8S_EXPOSE_VIA_INGRESS: {{ .Values.panel.k8sExposeViaIngress | quote }}
  K8S_INGRESS_HOST: {{ .Values.panel.k8sIngressHost | quote }}
  K8S_INGRESS_CLASS: {{ default .Values.ingress.className .Values.panel.k8sIngressClass | quote }}
  K8S_INGRESS_TLS_SECRET: {{ .Values.panel.k8sIngressTlsSecret | quote }}
  K8S_APPS_NAMESPACE: {{ .Values.panel.appsNamespace | quote }}
  K8S_STORAGE_CLASS: {{ .Values.panel.k8sStorageClass | quote }}
  K8S_VOLUME_STORAGE_SIZE: {{ .Values.panel.k8sVolumeStorageSize | quote }}
  SPRING_APPLICATION_JSON: {{ dict "agent" (dict "openclaw" (dict "trusted-proxies" .Values.openclaw.trustedProxies "panel-public-origins" .Values.openclaw.panelPublicOrigins "k8s" (dict "trusted-proxy-cidrs" .Values.openclaw.k8s.trustedProxyCidrs "auto-discover-node-pod-cidrs" .Values.openclaw.k8s.autoDiscoverNodePodCidrs))) | toJson | quote }}
