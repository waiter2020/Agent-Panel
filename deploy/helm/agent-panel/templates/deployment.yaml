apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "agent-panel.fullname" . }}
  namespace: {{ include "agent-panel.namespace" . }}
  labels:
    {{- include "agent-panel.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "agent-panel.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "agent-panel.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      containers:
        - name: panel
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.targetPort }}
              name: http
            - containerPort: {{ .Values.service.managementPort }}
              name: management
          envFrom:
            - configMapRef:
                name: {{ include "agent-panel.fullname" . }}-config
            - secretRef:
                name: {{ include "agent-panel.fullname" . }}-secret
          volumeMounts:
            - name: panel-logs
              mountPath: /var/log/agent-panel
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: {{ .Values.service.managementPort }}
            initialDelaySeconds: 60
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: {{ .Values.service.managementPort }}
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: panel-logs
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "agent-panel.fullname" . }}
  namespace: {{ include "agent-panel.namespace" . }}
  labels:
    {{- include "agent-panel.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "agent-panel.selectorLabels" . | nindent 4 }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
